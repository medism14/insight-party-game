services:
  insight-frontend:
    image: insight-frontend:latest
    container_name: insight-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5182}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - insight-frontend-network

networks:
  insight-frontend-network:
    driver: bridge
